name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Restore debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Build APK
        env:
          UPDATE_APK_URL: https://github.com/${{ github.repository }}/releases/latest/download/estoque-debug.apk
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk estoque-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: estoque-debug.apk
          generate_release_notes: true
